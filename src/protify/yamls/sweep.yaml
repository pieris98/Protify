early_terminate: {type: hyperband, min_iter: 10}

parameters:
  # Common parameters for all training modes
  lr:
    distribution: log_uniform_values
    min: 0.000001
    max: 0.01
  weight_decay:
    distribution: log_uniform_values
    min: 0.000001
    max: 0.1
  hidden_size:
    distribution: q_uniform
    min: 64
    max: 8192
    q: 8
  n_layers:
    distribution: int_uniform
    min: 1
    max: 4
  dropout:
    distribution: uniform
    min: 0.0
    max: 0.5
  
  # Transformer probe specific parameters
  classifier_dropout:
    distribution: uniform
    min: 0.0
    max: 0.5
  pre_ln:
    values: [True, False]
  classifier_dim:
    distribution: q_uniform
    min: 64
    max: 8192
    q: 8
  
  # LoRA parameters
  lora_r:
    distribution: q_uniform
    min: 4
    max: 128
    q: 4
  lora_alpha:
    distribution: q_uniform
    min: 4
    max: 128
    q: 4
  lora_dropout:
    distribution: uniform
    min: 0.0
    max: 0.5