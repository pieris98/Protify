method: bayes
metric: {name: mcc, goal: maximize}
early_terminate: {type: hyperband, min_iter: 10}

parameters:
  lr:
    distribution: log_uniform_values
    min: 0.00001
    max: 0.01
  weight_decay:
    distribution: log_uniform_values
    min: 0.000001
    max: 0.1
  transformer_dropout:
    distribution: uniform
    min: 0.0
    max: 0.5
  classifier_dropout:
    distribution: uniform
    min: 0.0
    max: 0.5
  pre_ln:
    values: [True, False]
  classifier_dim:
    values: [4096, 8192]
  n_heads:
    values: [2, 4, 8]
  hidden_size:
    values: [512, 1024, 2048, 4096, 8192]
  n_layers:
    values: [1, 2]
  lora_r:
    values: [8, 16, 32]
  lora_alpha:
    values: [16, 32, 64]
  lora_dropout:
    values: [0.0, 0.01, 0.05]
  probe_batch_size:
    values: [16,32, 64]
  probe_pooling_types:
    values: ["cls", "mean"]
