method: bayes
metric: {name: mcc, goal: maximize}
early_terminate: {type: hyperband, min_iter: 10}

parameters:
  # Common parameters for all training modes
  lr:
    distribution: log_uniform_values
    min: 0.000001
    max: 0.01
  weight_decay:
    distribution: log_uniform_values
    min: 0.000001
    max: 0.1
  
  # Full finetuning specific parameters
  base_batch_size:
    values: [4, 8, 16]
  base_grad_accum:
    values: [1, 2, 4]
  num_epochs:
    values: [3, 5]
  lora:
    values: [True, False]
  
  # Probe specific parameters
  probe_batch_size:
    values: [16, 32, 64, 128]
  dropout:
    distribution: uniform
    min: 0.0
    max: 0.5
  hidden_size:
    values: [512, 1024, 2048, 4096, 8192]
  n_layers:
    values: [1, 2, 3]
  probe_pooling_types:
    values: ["cls", "mean"]
  
  # Transformer probe specific parameters
  transformer_dropout:
    distribution: uniform
    min: 0.0
    max: 0.5
  classifier_dropout:
    distribution: uniform
    min: 0.0
    max: 0.5
  pre_ln:
    values: [True, False]
  classifier_dim:
    values: [4096, 8192]
  n_heads:
    values: [2, 4, 8]
  
  # LoRA parameters
  lora_r:
    values: [8, 16, 32]
  lora_alpha:
    values: [16, 32, 64]
  lora_dropout:
    values: [0.0, 0.01, 0.05]