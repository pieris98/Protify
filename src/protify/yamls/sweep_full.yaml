method: bayes
metric: {name: mcc, goal: maximize}
early_terminate: {type: hyperband, min_iter: 10}

parameters:
  lr:
    distribution: log_uniform_values
    min: 0.000001
    max: 0.0001
  weight_decay:
    distribution: log_uniform_values
    min: 0.000001
    max: 0.1
  base_batch_size:
    values: [4, 8, 16]
  base_grad_accum:
    values: [1, 2, 4]
  num_epochs:
    values: [3, 5]
  lora:
    values: [True, False]
  lora_r:
    values: [8, 16, 32]
  lora_alpha:
    values: [16, 32, 64]
  lora_dropout:
    values: [0.0, 0.01, 0.05]