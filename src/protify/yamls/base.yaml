# ID
hf_username: Synthyra
hf_token: null
synthyra_api_key: null
wandb_api_key: null


# Random seeds
seed: !!int 42
deterministic: !!bool false

# Paths
yaml_path: null
log_dir: logs
results_dir: results
model_save_dir: weights
embedding_save_dir: embeddings
download_dir: Synthyra/mean_pooled_embeddings
plots_dir: plots
replay_path: null
pretrained_probe_path: null


# DataArguments:
delimiter: ','
col_names:
  - seqs
  - labels
max_length: !!int 1024
trim: !!bool false
data_names:
  - DeepLoc-2
data_dirs: []


# BaseModelArguments:
model_names:
  - ESM2-8
# Alternative: use model_paths + model_types instead of model_names (mutually exclusive)
# model_paths:
#   - answerdotai/ModernBERT-base
# model_types:
#   - custom


# ProbeArguments:
probe_type: linear  # valid options: linear, transformer, lyra
tokenwise: !!bool false
hidden_size: !!int 8192
dropout: !!float 0.2
n_layers: !!int 1
sim_type: dot #valid options: dot, cosine, euclidean
pre_ln: !!bool true
classifier_size: !!int 4096
transformer_dropout: !!float 0.1
classifier_dropout: !!float 0.2
n_heads: !!int 4
rotary: !!bool true
attention_backend: flex
output_s_max: !!bool false
probe_pooling_types:
  - cls
save_model: !!bool false
push_raw_probe: !!bool false
production_model: !!bool false
use_lora: !!bool false
lora_r: !!int 8
lora_alpha: !!float 32.0
lora_dropout: !!float 0.01


# ScikitArguments:
scikit_n_iter: !!int 10
scikit_cv: !!int 3
scikit_random_state: !!int 42
scikit_model_name: null
use_scikit: !!bool false
n_jobs: !!int 1


# EmbeddingArguments:
embedding_batch_size: !!int 4
num_workers: !!int 0
download_embeddings: !!bool false
matrix_embed: !!bool false
embedding_pooling_types:
  - mean
save_embeddings: !!bool false
embed_dtype: !!str float32
sql: !!bool false
read_scaler: !!int 100


# TrainerArguments:
num_epochs: !!int 200
probe_batch_size: !!int 64
base_batch_size: !!int 4
probe_grad_accum: !!int 1
base_grad_accum: !!int 8
lr: !!float 1e-4
weight_decay: !!float 0.00
patience: !!int 1
full_finetuning: !!bool false
hybrid_probe: !!bool false
num_runs: !!int 1
